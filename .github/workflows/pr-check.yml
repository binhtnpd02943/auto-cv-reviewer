name: PR Checks

on:
  pull_request:
    branches: [ stg, main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Code Syntax
        run: npm run lint --if-present

      - name: Run Tests
        run: npm test --if-present
