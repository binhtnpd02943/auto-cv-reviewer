name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: production_deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add Known Hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Script execution
        env:
          VPS_USER: "root"
          VPS_HOST: ${{ secrets.VPS_HOST }}
          ENVIRONMENT: "production"
        run: |
          # Copy repo content via tar
          TAR_FILE="/tmp/release-${GITHUB_SHA::8}.tar.gz"
          tar -czf $TAR_FILE --exclude='.git' .
          
          # Upload tar to VPS
          scp $TAR_FILE $VPS_USER@$VPS_HOST:/tmp/
          
          # Execute deploy script on VPS
          ssh $VPS_USER@$VPS_HOST "bash -s" < deploy/deploy.sh $ENVIRONMENT ${GITHUB_SHA::8}
