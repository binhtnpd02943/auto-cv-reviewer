services:
  app:
    image: ${IMAGE_URI}
    container_name: cv-reviewer-production-app
    restart: always
    ports:
      - "3000:3000" # Map host 3000 to container 3000
    env_file:
      - .env
    environment:
      - REDIS_HOST=cv-reviewer-production-redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./uploads:/usr/src/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    # --- ĐOẠN PHÉP THUẬT NẰM Ở ĐÂY ---
    healthcheck:
      # Bắn request trực tiếp bằng Node.js, không sợ thiếu curl hay wget!
      test: [ "CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: cv-reviewer-production-redis
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
