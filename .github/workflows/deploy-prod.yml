name: Deploy Auto-CV Reviewer to AWS ECR

on:
  push:
    branches: [main, stg]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  ECR_REPOSITORY: auto-cv-reviewer
  PROJECT_NAME: auto-cv-reviewer

jobs:
  # ── Job 1: Test ───────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ── Job 2: Build & Push ────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ── Job 3: Deploy ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      # BƯỚC QUAN TRỌNG: Tạo thư mục trước khi copy file
      - name: Ensure project directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p ~/${{ env.PROJECT_NAME }}

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Copy đúng file compose theo môi trường
          source: "docker-compose.${{ github.ref_name == 'main' && 'prod' || 'stage' }}.yml"
          target: "~/${{ env.PROJECT_NAME }}"
          strip_components: 0

      - name: Deploy application via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DEPLOY_ENV: ${{ github.ref_name == 'main' && 'prod' || 'stg' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION, IMAGE_TAG, DEPLOY_ENV
          script: |
            # 1. Khởi tạo môi trường (Fix lỗi command not found & directory not found)
            sudo apt-get update && sudo apt-get install unzip -y
            if ! command -v aws &> /dev/null; then
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip -o awscliv2.zip
              sudo ./aws/install
              rm -rf awscliv2.zip aws/
            fi

            mkdir -p ~/${{ env.PROJECT_NAME }}
            cd ~/${{ env.PROJECT_NAME }}

            set -e

            # 2. Lấy Secret từ AWS Manager (Đúng chuẩn Leader)
            echo "🔐 Fetching secrets..."
            aws secretsmanager get-secret-value \
              --secret-id auto-cv/$DEPLOY_ENV/env \
              --region $AWS_REGION \
              --query SecretString \
              --output text | tr -d '\r' > .env

            # 3. Login ECR
            echo "🔑 Logging in ECR..."
            ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_REGION.amazonaws.com
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

            # 4. Ghi đè IMAGE_URI vào .env
            IMAGE_URI="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"
            sed -i '/^IMAGE_URI=/d' .env || true
            echo "IMAGE_URI=$IMAGE_URI" >> .env

            # 5. Pull & Up
            COMPOSE_FILE="docker-compose.${{ github.ref_name == 'main' && 'prod' || 'stage' }}.yml"
            docker compose -f $COMPOSE_FILE pull
            docker compose -f $COMPOSE_FILE up -d --wait --remove-orphans

            # 6. Health Check
            echo "🏥 Health checking..."
            sleep 10
            if docker compose -f $COMPOSE_FILE ps | grep -q "running"; then
              echo "✅ DEPLOY SUCCESSFUL!"
            else
              echo "❌ DEPLOY FAILED!"
              docker compose -f $COMPOSE_FILE logs --tail 20
              exit 1
            fi

            # 7. Cleanup
            docker image prune -f
            echo "🎉 Deployment Successful!"
