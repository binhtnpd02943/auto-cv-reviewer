name: Deploy to Staging

on:
  push:
    branches:
      - stg

jobs:
  build-and-deploy-stg:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Copy local .env file
        run: cp /Users/mac/Documents/Source-TechZen/auto-cv-reviewer/.env .

      - name: Deploy to Local Staging (Mac M1)
        run: |
          echo "Deploying directly on Mac M1 (Staging)..."
          # Chạy script deploy. Nó sẽ dùng Docker Desktop để build và up container
          bash scripts/deploy.sh

      - name: Post-Deploy Healthcheck
        run: |
          echo "Running healthcheck..."
          bash scripts/healthcheck.sh
