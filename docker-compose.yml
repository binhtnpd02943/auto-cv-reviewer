version: '3.8'

services:
  # Cấu hình cho Redis
  redis:
    image: redis:7-alpine
    # Xoá fix cứng container_name để tránh xung đột trên shared host
    ports:
      - "${REDIS_PORT:-6379}:6379"
    # Lưu dữ liệu Redis xuống ổ cứng server để không bị mất Job khi restart
    volumes:
      - redis_data:/data
    restart: always

  # Cấu hình cho Node.js App (API + Workers)
  app:
    build: .
    # Xoá fix cứng container_name
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      - redis
    environment:
      # KHÔNG ĐƯỢC ĐỂ LÀ localhost. Phải trỏ tên service 'redis'
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
    # Đọc thêm biến môi trường (như GEMINI_API_KEY) từ file .env
    env_file:
      - .env
    volumes:
      # Mount thư mục uploads ra ngoài để dễ quản lý (Tùy chọn)
      - ./uploads:/usr/src/app/uploads
    restart: always

volumes:
  redis_data:

