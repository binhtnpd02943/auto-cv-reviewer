version: '3.8'

services:
  # App container cho việc dev local (sử dụng nodemon để auto-reload code)
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: cv-reviewer-local-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Mount toàn bộ source code vào container để dev local
      - ./:/usr/src/app
      # Bỏ qua việc mount đè node_modules từ máy host vào container
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # Chạy lệnh dev từ package.json (nodemon) thay vì npm start
    command: npm run dev
    depends_on:
      redis:
        condition: service_healthy

  # Cần Redis để chạy BullMQ local
  redis:
    image: redis:7-alpine
    container_name: cv-reviewer-local-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
