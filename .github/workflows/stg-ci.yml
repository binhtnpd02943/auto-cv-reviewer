name: CI Check (Build & Test)

on:
  pull_request:
    branches:
      - stg
      - main
  push:
    branches:
      - stg

jobs:
  test-and-build:
    name: Run Tests and Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Hoặc phiên bản Node bạn đang dùng
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint --if-present

      - name: Run Tests
        run: npm test --if-present

      - name: Dry-run Build Docker Image
        run: |
          echo "Thực hiện build thử Docker image để đảm bảo không có lỗi..."
          docker compose build
          echo "Build thành công! Sẵn sàng cho quá trình deploy thật."
